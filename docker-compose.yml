services:
  culifeed-prd:
    build:
      context: .
      dockerfile: Dockerfile.alpine
      args:
        UID: 1001
        GID: 1001
    image: culifeed:local
    container_name: culifeed-prd
    restart: unless-stopped
    env_file:
      - .env.prd
    environment:
      - TZ=UTC
      # Stopgap (R0 from cutover spec): on v1 while the v2 ingestion gap is fixed.
      # _process_channel_v2 currently reads only existing DB rows; it does not fetch
      # feeds. Flip back to true once feed ingestion is wired into the v2 path.
      - CULIFEED_FILTERING__USE_EMBEDDING_PIPELINE=false
    volumes:
      - .:/app
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  sqlitebrowser:
    image: linuxserver/sqlitebrowser
    container_name: sqlitebrowser
    restart: unless-stopped
    ports:
      - "100.76.118.121:3001:3001"
    volumes:
      - ./sqlitebrowser/config:/config
      - ./data:/data
    environment:
      - PUID=1001
      - PGID=1001
      - TZ=Etc/UTC
